packages:
  - 'packages/*'

# `@tsconfig/*` presets must be resolvable from the workspace root so
# tsup's `load-tsconfig` (a transitive dep that runs from
# `node_modules/.pnpm/...`) can follow `extends: "@tsconfig/node20"` in
# each package's tsconfig.json. Without this hoist, `pnpm -r run build`
# fails with `Cannot find module '@tsconfig/node20'` even though the
# preset is correctly listed in the package's devDependencies.
publicHoistPattern:
  - '@tsconfig/*'

blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@polygonlabs/*'
  - '@maticnetwork/*'
  - '@agglayer/*'
  - '@0xsequence/*'
  - '@0xtrails/*'
onlyBuiltDependencies:
  - esbuild
trustPolicy: no-downgrade
