name: Release Package

permissions:
  contents: read
  
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to release from (master=latest, beta=beta, dev=dev)"
        required: false
        default: "master"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.SEMANTIC_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.inputs.branch || 'master' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run deploy

      - name: Lint
        run: npm run lint

      - name: Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          git config --global user.email "semantic-release-bot@users.noreply.github.com"
          git config --global user.name "Semantic Release Bot"

          # Configure npm authentication
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

          npx semantic-release
